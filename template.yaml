AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  stock-market-etl-pipeline

  Sample SAM Template for stock-market-etl-pipeline

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 60

    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Parameters:
  FetchRequestSymbols:
    Description: symbol given to fetch_stock_data function for fetch request
    Type: CommaDelimitedList
    Default: IBM,AAPL,MSFT
Resources:
  StockDataGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: stock_market_etl_db
  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "${StockDataBucket.Arn}"
                  - !Sub "${StockDataBucket.Arn}/*"
  FetchStockDataFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: fetch_stock_data/
      Handler: app.lambda_handler
      Runtime: python3.14
      Policies:
        - S3WritePolicy:
            BucketName: !Ref StockDataBucket
        - SSMParameterReadPolicy:
            ParameterName: alphavantage-api-key
      Environment:
        Variables:
          STOCK_SYMBOLS: !Join [ ",", !Ref FetchRequestSymbols]
          BUCKET_NAME: !Ref StockDataBucket
      Architectures:
      - x86_64
      Events:
        DailyFetch:
          Type: Schedule
          Properties:
            Schedule: cron(30 23 * * ? *)
            Name: DailyStockFetchSchedule
            Description: Triggers stock data fetch once daily after the market closes
            Enabled: true
  StockDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "stock-market-etl-data-${AWS::AccountId}"
  StockDataGlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: stock-data-crawler
      Role: !GetAtt GlueCrawlerRole.Arn 
      DatabaseName: !Ref StockDataGlueDatabase
      Targets:
        S3Targets:
          - Path: !Sub "s3://${StockDataBucket}/stock-data/"
      Schedule: 
        ScheduleExpression: cron(30 0 * * ? *)
Outputs:
  FetchStockDataFunction:
    Description: Fetch stock data Lambda Function ARN
    Value: !GetAtt FetchStockDataFunction.Arn
  FetchStockDataFunctionIamRole:
    Description: Implicit IAM Role created for fetch stock data function
    Value: !GetAtt FetchStockDataFunctionRole.Arn
