AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  stock-market-etl-pipeline

  Sample SAM Template for stock-market-etl-pipeline

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 60

    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Parameters:
  FetchRequestSymbols:
    Description: symbol given to fetch_stock_data function for fetch request
    Type: CommaDelimitedList
    Default: IBM,AAPL,MSFT
  AlarmEmail:
    Type: String 
    Description: Email address for CloudWatch alarm notifications
    Default: stockmarketpipeline.alerts@outlook.com 
Resources:
  StockDataGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: stock_market_etl_db
  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "${StockDataBucket.Arn}"
                  - !Sub "${StockDataBucket.Arn}/*"
  FetchStockDataFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: fetch_stock_data/
      Handler: app.lambda_handler
      Runtime: python3.14
      Policies:
        - S3WritePolicy:
            BucketName: !Ref StockDataBucket
        - SSMParameterReadPolicy:
            ParameterName: alphavantage-api-key
      Environment:
        Variables:
          STOCK_SYMBOLS: !Join [ ",", !Ref FetchRequestSymbols]
          BUCKET_NAME: !Ref StockDataBucket
      Architectures:
      - x86_64
      Events:
        DailyFetch:
          Type: Schedule
          Properties:
            Schedule: cron(30 23 * * ? *)
            Name: DailyStockFetchSchedule
            Description: Triggers stock data fetch once daily after the market closes
            Enabled: true
      EventInvokeConfig:
        DestinationConfig:
          OnSuccess:
            Type: Lambda 
            Destination: !GetAtt StartCrawlerFunction.Arn 
  StockDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "stock-market-etl-data-${AWS::AccountId}"
  StockDataGlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: stock-data-crawler
      Role: !GetAtt GlueCrawlerRole.Arn 
      DatabaseName: !Ref StockDataGlueDatabase
      Targets:
        S3Targets:
          - Path: !Sub "s3://${StockDataBucket}/stock-data/"
      SchemaChangePolicy:
        UpdateBehavior: LOG
        DeleteBehavior: LOG 
  StockDataGlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref StockDataGlueDatabase
      TableInput:
        Name: stock_data
        PartitionKeys:
          - Name: symbol
            Type: string
          - Name: year
            Type: string
          - Name: month
            Type: string
          - Name: day
            Type: string
        StorageDescriptor:
          Columns:
            - Name: open
              Type: string
            - Name: high
              Type: string
            - Name: low
              Type: string
            - Name: close
              Type: string
            - Name: volume
              Type: string
            - Name: pct_change
              Type: double
            - Name: significant_move
              Type: boolean
          Location: !Sub "s3://${StockDataBucket}/stock-data/"
          InputFormat: org.apache.hadoop.mapred.TextInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat
          SerdeInfo:
            SerializationLibrary: org.openx.data.jsonserde.JsonSerDe
            Parameters:
              paths: "1. open,2. high,3. low,4. close,5. volume,pct_change,significant_move"
  StockDataAthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: stock-data-workgroup
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub "s3://${StockDataBucket}/athena-results/"
        EnforceWorkGroupConfiguration: false
        PublishCloudWatchMetricsEnabled: true 
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic 
    Properties:
      TopicName: stock-pipeline-alarms 
      Subscription: 
        - Protocol: email
          Endpoint: !Ref AlarmEmail
  ErrorLogMetricFilter:
    Type: AWS::Logs::MetricFilter 
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FetchStockDataFunction}"
      FilterPattern: "ERROR"
      MetricTransformations:
        - MetricName: PipelineErrorCount
          MetricNamespace: StockPipeline 
          MetricValue: "1"
  ErrorLogAlarm:
    Type: AWS::CloudWatch::Alarm 
    Properties: 
      AlarmName: stock-market-pipeline-log-alarm
      AlarmDescription: Fires when the pipeline logs an ERROR-level message
      Namespace: StockPipeline
      MetricName: PipelineErrorCount
      Statistic: Sum 
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic 
  UnhandledErrorAlarm:
    Type: AWS::CloudWatch::Alarm 
    Properties:
      AlarmName: stock-pipeline-unhandled-error-alarm
      AlarmDescription: Fires when the Lambda function has an unhandled invocation error
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FetchStockDataFunction
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
  CrawlerCompletionRule:
    Type: AWS::Events::Rule 
    Properties: 
      EventPattern:
        source: 
          - aws.glue
        detail-type:
          - Glue Crawler State Change 
        detail:
          crawlerName:
            - stock-data-crawler
          state:
            - Succeeded
      Targets:
        - Arn: !GetAtt DashboardExportFunction.Arn
          Id: ExportFunctionTarget
  DashboardExportPermission:
    Type: AWS::Lambda::Permission 
    Properties:
      FunctionName: !Ref DashboardExportFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CrawlerCompletionRule.Arn
  DashboardExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: export_dashboard_data/
      Handler: app.lambda_handler
      Runtime: python3.14
      Environment:
        Variables:
          BUCKET_NAME: !Ref StockDataBucket 
          ATHENA_WORKGROUP: !Ref StockDataAthenaWorkGroup
          GLUE_DATABASE: !Ref StockDataGlueDatabase
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - athena:StartQueryExecution
                - athena:GetQueryExecution
                - athena:GetQueryResults
              Resource: "*"
            - Effect: Allow
              Action:
                - glue:GetTable
                - glue:GetDatabase
                - glue:CreateTable
                - glue:GetPartitions
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:ListBucket
                - s3:GetBucketLocation
              Resource:
                - !Sub "${StockDataBucket.Arn}"
                - !Sub "${StockDataBucket.Arn}/*"
      Architectures:
        - x86_64 
  StartCrawlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: start_crawler/
      Handler: app.lambda_handler
      Runtime: python3.14
      Environment:
        Variables:
          CRAWLER_NAME: !Ref StockDataGlueCrawler
      Policies:
        - Statement: 
            - Effect: Allow
              Action:
                - glue:StartCrawler 
              Resource: "*"
      Architectures:
        - x86_64 
  FetchStockDataInvokeCrawlerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StartCrawlerFunction
      Action: lambda:InvokeFunction
      Principal: lambda.amazonaws.com
      SourceArn: !GetAtt FetchStockDataFunction.Arn
Outputs:
  FetchStockDataFunction:
    Description: Fetch stock data Lambda Function ARN
    Value: !GetAtt FetchStockDataFunction.Arn
  FetchStockDataFunctionIamRole:
    Description: Implicit IAM Role created for fetch stock data function
    Value: !GetAtt FetchStockDataFunctionRole.Arn
